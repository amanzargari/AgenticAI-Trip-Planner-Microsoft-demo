<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trip Planner AI</title>
<style>
/* ── Design tokens ── */
:root {
  --bg:        #0f1117;
  --surface:   #1a1d27;
  --surface2:  #12151f;
  --border:    #2d3148;
  --accent:    #6c63ff;
  --accent2:   #ff6584;
  --text:      #e8eaf6;
  --muted:     #8b90b0;
  --green:     #4caf50;
  --red:       #f44336;
  --yellow:    #ff9800;
  --blue:      #2196f3;
  --ai-bubble: #1e2135;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.header-title {
  font-size: 1.15rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  white-space: nowrap;
}
.agents-bar { display: flex; flex-wrap: wrap; gap: 7px; flex: 1; }
.agent-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; font-size: .72rem; padding: 3px 9px; color: var(--muted);
}
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot.online  { background: var(--green); }
.dot.offline { background: var(--red); }
.dot.checking { background: var(--yellow); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

/* ── Layout ── */
.main {
  display: grid;
  grid-template-columns: 400px 1fr 380px;
  flex: 1;
  overflow: hidden;
}
@media(max-width:1100px) { .main { grid-template-columns: 360px 1fr; } .trace-panel { display:none; } }
@media(max-width:760px)  { .main { grid-template-columns: 1fr; } .itinerary-panel { display:none; } }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ══════════════════════ CHAT PANEL ══════════════════════ */
.chat-panel {
  display: flex; flex-direction: column;
  border-right: 1px solid var(--border); overflow: hidden;
}
.messages {
  flex: 1; overflow-y: auto; padding: 16px 14px;
  display: flex; flex-direction: column; gap: 14px;
  scroll-behavior: smooth;
}
/* Bubbles */
.msg { display: flex; gap: 9px; max-width: 100%; }
.msg.user { flex-direction: row-reverse; }
.avatar {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem; flex-shrink: 0; margin-top: 2px;
}
.msg.ai   .avatar { background: var(--accent); }
.msg.user .avatar { background: #3a3060; }
.bubble {
  max-width: calc(100% - 46px);
  padding: 9px 13px; border-radius: 14px;
  font-size: .88rem; line-height: 1.5;
}
.msg.ai   .bubble { background: var(--ai-bubble); border-top-left-radius: 4px; }
.msg.user .bubble { background: var(--accent); color: #fff; border-top-right-radius: 4px; }

/* Trip form card */
.form-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px; font-size: .86rem;
}
.form-card h3 { font-size: .92rem; margin-bottom: 12px; font-weight: 600; }
label { display: block; font-size: .75rem; color: var(--muted); margin-bottom: 3px; margin-top: 10px; }
label:first-of-type { margin-top: 0; }
input {
  width: 100%; background: #0f1117; border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: .86rem; padding: 7px 9px;
  transition: border-color .2s;
}
input:focus { outline: none; border-color: var(--accent); }
.date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.prefs-hint { font-size: .72rem; color: var(--muted); margin-top: 3px; }
.plan-btn {
  width: 100%; background: linear-gradient(135deg, var(--accent), #8b5cf6);
  border: none; border-radius: 7px; color: #fff; cursor: pointer;
  font-size: .88rem; font-weight: 600; margin-top: 12px; padding: 9px;
  transition: opacity .2s;
}
.plan-btn:hover  { opacity: .88; }
.plan-btn:disabled { opacity: .4; cursor: not-allowed; }

/* Typing indicator */
.typing { display: flex; gap: 4px; align-items: center; padding: 10px 13px; }
.typing span {
  width: 6px; height: 6px; background: var(--muted); border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* Input bar */
.input-bar {
  display: flex; gap: 7px; padding: 10px 14px;
  border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0;
}
.input-bar input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 18px; color: var(--text); font-size: .88rem; padding: 8px 14px;
}
.input-bar input:disabled { opacity: .5; }
.send-btn {
  background: var(--accent); border: none; border-radius: 50%;
  width: 36px; height: 36px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: opacity .2s;
}
.send-btn:hover    { opacity: .85; }
.send-btn:disabled { opacity: .4; cursor: not-allowed; }
.send-btn svg { width: 16px; height: 16px; fill: #fff; }

/* ══════════════════════ ITINERARY PANEL ══════════════════════ */
.itinerary-panel {
  display: flex; flex-direction: column; overflow: hidden;
  border-right: 1px solid var(--border);
}
.panel-header {
  padding: 13px 18px 10px;
  border-bottom: 1px solid var(--border);
  font-weight: 600; font-size: .95rem;
  flex-shrink: 0; display: flex; align-items: center; gap: 8px;
  color: var(--muted);
}
.panel-header.has-data { color: var(--text); }
.panel-scroll { flex: 1; overflow-y: auto; padding: 14px 18px; }

/* Summary */
.summary-bar {
  display: flex; flex-wrap: wrap; gap: 12px;
  padding: 10px 14px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 7px;
  margin-bottom: 14px; font-size: .83rem;
}
.summary-item { display: flex; flex-direction: column; gap: 1px; }
.summary-label { color: var(--muted); font-size: .7rem; }

/* Day cards */
.day-card { border: 1px solid var(--border); border-radius: 9px; margin-bottom: 12px; overflow: hidden; }
.day-header {
  background: #1e2135; padding: 10px 14px;
  font-weight: 600; font-size: .9rem;
  display: flex; align-items: center; gap: 7px;
}
.day-badge { background: var(--accent); border-radius: 14px; padding: 2px 8px; font-size: .7rem; }
.event {
  padding: 9px 14px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; align-items: flex-start;
}
.event-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 2px; }
.event-time { font-size: .74rem; color: var(--muted); white-space: nowrap; min-width: 90px; }
.event-name { font-weight: 500; font-size: .86rem; margin-bottom: 1px; }
.event-meta { font-size: .76rem; color: var(--muted); }
.stars { color: #ffd700; }

/* Day card slide-in animation */
.day-card-entering {
  opacity: 0;
  transform: translateY(14px);
  transition: opacity .38s ease, transform .38s ease;
}
.day-card-entering.day-card-visible {
  opacity: 1;
  transform: translateY(0);
}

/* Streaming progress bar inside summary */
.streaming-status {
  display: flex; align-items: center; gap: 8px;
  font-size: .78rem; color: var(--muted); padding: 2px 0;
}
.streaming-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent); animation: pulse 1s infinite;
}

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; color: var(--muted);
  text-align: center; gap: 10px; padding: 28px;
}
.empty-state .icon { font-size: 2.5rem; opacity: .35; }
.empty-state p { font-size: .86rem; }

/* ══════════════════════ TRACE PANEL ══════════════════════ */
.trace-panel {
  display: flex; flex-direction: column; overflow: hidden;
}
.trace-header {
  padding: 13px 16px 10px;
  border-bottom: 1px solid var(--border);
  font-weight: 600; font-size: .95rem;
  flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
}
.trace-scroll { flex: 1; overflow-y: auto; padding: 12px 14px; }
.trace-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--muted); text-align: center; gap: 8px; padding: 24px;
}
.trace-empty .icon { font-size: 2rem; opacity: .3; }

/* Trace event card */
.trace-event {
  border: 1px solid var(--border); border-radius: 8px;
  margin-bottom: 10px; overflow: hidden;
  transition: border-color .2s;
}
.trace-event:hover { border-color: #444870; }
.trace-event-header {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px; cursor: pointer;
  background: var(--surface2); user-select: none;
}
.trace-step-badge {
  background: #252840; border: 1px solid var(--border);
  border-radius: 4px; padding: 1px 6px;
  font-size: .68rem; color: var(--muted); flex-shrink: 0;
}
.trace-agent { font-size: .82rem; font-weight: 600; flex: 1; }
.trace-status {
  font-size: .7rem; padding: 2px 7px; border-radius: 10px;
  font-weight: 600; flex-shrink: 0;
}
.trace-status.success { background: #1a3a1a; color: var(--green); }
.trace-status.error   { background: #3a1a1a; color: var(--red); }
.trace-status.skipped { background: #2a2a1a; color: var(--yellow); }
.trace-chevron { font-size: .75rem; color: var(--muted); flex-shrink: 0; transition: transform .2s; }
.trace-event.open .trace-chevron { transform: rotate(180deg); }

.trace-summary {
  padding: 5px 12px 8px;
  background: var(--surface2);
  border-top: 1px solid var(--border);
  font-size: .76rem; color: var(--muted);
  display: flex; flex-direction: column; gap: 2px;
}
.trace-summary span { display: flex; gap: 6px; }
.trace-summary b { color: #9aa0c4; min-width: 32px; }

.trace-detail { display: none; }
.trace-event.open .trace-detail { display: block; }
.trace-section {
  border-top: 1px solid var(--border); padding: 10px 12px;
}
.trace-section-label {
  font-size: .7rem; color: var(--muted); text-transform: uppercase;
  letter-spacing: .05em; margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
}
.trace-section-label .badge {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; padding: 1px 6px; font-size: .66rem; text-transform: none;
  letter-spacing: 0;
}
pre.trace-json {
  background: #090c14; border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 10px;
  font-family: 'Consolas', 'Cascadia Code', monospace;
  font-size: .72rem; color: #c8d0f0; overflow-x: auto;
  max-height: 260px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
  line-height: 1.5;
}
/* JSON syntax colouring via class */
.j-key    { color: #7ec8e3; }
.j-str    { color: #a8d8a8; }
.j-num    { color: #f0c070; }
.j-bool   { color: #c08080; }
.j-null   { color: #888; }
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <span class="header-title">✈ Trip Planner AI</span>
  <div class="agents-bar" id="agents-bar">
    <span class="agent-chip"><span class="dot checking"></span>Checking agents…</span>
  </div>
</div>

<!-- ── Main layout ── -->
<div class="main">

  <!-- ①  Chat panel -->
  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="msg ai" id="welcome-msg">
        <div class="avatar">✈</div>
        <div class="bubble">
          <div class="form-card">
            <h3>Plan a new trip</h3>

            <label for="city">Destination</label>
            <input id="city" type="text" placeholder="Paris, Rome, Tokyo…" value="Milan, Italy"/>

            <label>Dates</label>
            <div class="date-row">
              <input id="trip_start" type="date" value="2026-06-10"/>
              <input id="trip_end"   type="date" value="2026-06-15"/>
            </div>

            <label for="budget">Budget (EUR, optional)</label>
            <input id="budget" type="number" min="0" placeholder="e.g. 500" value="800"/>

            <label for="reason">Trip reason (optional)</label>
            <input id="reason" type="text" placeholder="honeymoon, family vacation…" value="vacation with friends"/>

            <label for="preferences">Preferences (optional)</label>
            <input id="preferences" type="text" placeholder="museums, vegetarian, outdoor walks…" value="ok with everything and also night life is important for me, we are adults and we don't have kids, we love museums"/>
            <div class="prefs-hint">Write anything — interests, dietary needs, travel style.</div>

            <button class="plan-btn" id="plan-btn" onclick="submitPlan()">Generate Itinerary →</button>
          </div>
        </div>
      </div>
    </div>

    <div class="input-bar" id="input-bar" style="display:none">
      <input
        id="chat-input"
        type="text"
        placeholder="Ask for changes: 'more outdoor', 'vegetarian restaurants'…"
        onkeydown="if(event.key==='Enter')sendChat()"
        disabled
      />
      <button class="send-btn" id="send-btn" onclick="sendChat()" disabled title="Send">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <!-- ②  Itinerary panel -->
  <div class="itinerary-panel">
    <div class="panel-header" id="itin-header">
      <span>🗺</span><span id="itin-title">Itinerary</span>
    </div>
    <div class="panel-scroll" id="itin-scroll">
      <div class="empty-state">
        <div class="icon">🗺</div>
        <p>Your itinerary appears here once you generate a plan.</p>
      </div>
    </div>
  </div>

  <!-- ③  Agent trace panel -->
  <div class="trace-panel">
    <div class="trace-header">
      <span>🔍 Agent Trace</span>
      <span id="trace-count" style="font-size:.75rem;color:var(--muted);font-weight:400"></span>
    </div>
    <div class="trace-scroll" id="trace-scroll">
      <div class="trace-empty">
        <div class="icon">🔍</div>
        <p>Agent communication log will appear here after a plan is generated.</p>
      </div>
    </div>
  </div>

</div><!-- .main -->

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let currentItinerary = null;
let originalParams   = null;
let isWorking        = false;
let activeEventSource = null;

// ── Agent status ──────────────────────────────────────────────────────────────
async function checkAgents() {
  try {
    const res  = await fetch('/api/agents/status');
    const data = await res.json();
    document.getElementById('agents-bar').innerHTML = data.map(a => `
      <span class="agent-chip">
        <span class="dot ${a.status === 'online' ? 'online' : 'offline'}"></span>
        ${esc(a.name)}
      </span>`).join('');
  } catch {
    document.getElementById('agents-bar').innerHTML =
      '<span class="agent-chip"><span class="dot offline"></span>Unreachable</span>';
  }
}

// ── Preferences helper ────────────────────────────────────────────────────────
function selectedPrefs() {
  const raw = document.getElementById('preferences').value.trim();
  if (!raw) return [];
  return raw.split(/[,;]+/).map(s => s.trim()).filter(Boolean);
}

// ── Initial plan (streaming) ──────────────────────────────────────────────────
async function submitPlan() {
  const city  = document.getElementById('city').value.trim();
  const start = document.getElementById('trip_start').value;
  const end   = document.getElementById('trip_end').value;
  if (!city || !start || !end) { alert('Please fill in destination and trip dates.'); return; }

  const budget = document.getElementById('budget').value;
  const reason = document.getElementById('reason').value.trim();
  const prefs  = selectedPrefs();

  originalParams = {
    city,
    trip_start:  start + 'T09:00:00',
    trip_end:    end   + 'T21:00:00',
    budget:      budget ? { total_budget: parseFloat(budget), currency: 'EUR' } : null,
    trip_reason: reason || null,
    preferences: prefs,
  };

  const summary = [
    `📍 ${city}`,
    `📅 ${fmtDateShort(start)} → ${fmtDateShort(end)}`,
    budget ? `💶 €${budget}` : null,
    reason ? `🎯 ${reason}` : null,
    prefs.length ? `❤ ${prefs.join(', ')}` : null,
  ].filter(Boolean).join('  ·  ');

  appendUserMsg(summary);
  setWorking(true);
  appendTyping();

  // Close any previous SSE connection
  if (activeEventSource) { activeEventSource.close(); activeEventSource = null; }

  // Step 1: submit task, get task_id
  let taskId;
  try {
    const res = await fetch('/api/plan/submit', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        city,
        trip_start:   originalParams.trip_start,
        trip_end:     originalParams.trip_end,
        total_budget: budget ? parseFloat(budget) : null,
        trip_reason:  reason || null,
        preferences:  prefs,
      }),
    });
    if (!res.ok) {
      const err = await res.json();
      removeTyping();
      appendAiMsg(`Sorry, something went wrong: ${err.detail || 'HTTP ' + res.status}`);
      setWorking(false);
      return;
    }
    const data = await res.json();
    taskId = data.task_id;
  } catch (e) {
    removeTyping();
    appendAiMsg('Request failed: ' + esc(e.message));
    setWorking(false);
    return;
  }

  // Step 2: open SSE stream — show itinerary panel immediately
  removeTyping();
  let dayCount = 0;
  let allTrace = [];
  initStreamingItinerary(city);

  const es = new EventSource(`/api/plan/stream/${taskId}`);
  activeEventSource = es;

  es.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    if (msg.type === 'day') {
      dayCount++;
      appendDayCard(msg.schedule, dayCount);
      updateStreamingStatus(`Scheduling day ${dayCount}…`);

    } else if (msg.type === 'trace') {
      allTrace = allTrace.concat(msg.events);
      renderTrace(allTrace);

    } else if (msg.type === 'done') {
      es.close();
      activeEventSource = null;
      const itin = msg.itinerary;
      currentItinerary = itin;
      const days = (itin.schedules || []).length;
      appendAiMsg(
        `I've planned your ${days}-day trip to <strong>${esc(itin.city || city)}</strong>! ` +
        `Ask me for changes — e.g. <em>"add more museums"</em> or <em>"vegetarian restaurants only"</em>.`
      );
      finalizeStreamingItinerary(itin);
      renderTrace(itin.trace || []);
      showChatInput();
      setWorking(false);

    } else if (msg.type === 'error') {
      es.close();
      activeEventSource = null;
      appendAiMsg(`Sorry, planning failed: ${esc(msg.message)}`);
      updateStreamingStatus('Failed — see chat for details.');
      setWorking(false);
    }
  };

  es.onerror = () => {
    es.close();
    activeEventSource = null;
    if (isWorking) {
      appendAiMsg('Connection lost during planning.');
      setWorking(false);
    }
  };
}

// ── Streaming itinerary helpers ───────────────────────────────────────────────
function initStreamingItinerary(city) {
  const hdr = document.getElementById('itin-header');
  hdr.classList.add('has-data');
  document.getElementById('itin-title').textContent = `Planning ${city}…`;
  document.getElementById('itin-scroll').innerHTML = `
    <div class="summary-bar" id="summary-bar">
      ${si('City', city)}
      <div class="summary-item">
        <span class="summary-label">Status</span>
        <div class="streaming-status" id="streaming-status">
          <span class="streaming-dot"></span>
          <span id="streaming-status-text">Finding places…</span>
        </div>
      </div>
    </div>
    <div id="day-cards"></div>`;
}

function updateStreamingStatus(text) {
  const el = document.getElementById('streaming-status-text');
  if (el) el.textContent = text;
}

function appendDayCard(day, idx) {
  const container = document.getElementById('day-cards');
  if (!container) return;
  const date = day.date || `Day ${idx}`;
  const div = document.createElement('div');
  div.className = 'day-card day-card-entering';
  div.id = `day-card-${idx}`;
  div.innerHTML = `
    <div class="day-header">
      <span class="day-badge">Day ${idx}</span>
      ${esc(fmtDateLong(date))}
    </div>
    ${(day.events || []).map(renderEvent).join('')}`;
  container.appendChild(div);
  // scroll the new card into view inside the panel
  const scroll = document.getElementById('itin-scroll');
  if (scroll) setTimeout(() => { scroll.scrollTop = scroll.scrollHeight; }, 50);
  // trigger CSS transition
  requestAnimationFrame(() => requestAnimationFrame(() => div.classList.add('day-card-visible')));
}

function finalizeStreamingItinerary(data) {
  const schedules   = data.schedules || [];
  const totalEvents = schedules.reduce((n, d) => n + (d.events || []).length, 0);
  document.getElementById('itin-title').textContent =
    `${data.city || ''} — ${schedules.length} day${schedules.length !== 1 ? 's' : ''}`;
  const bar = document.getElementById('summary-bar');
  if (bar) {
    bar.innerHTML = [
      data.city         ? si('City', data.city) : '',
      si('Days', schedules.length),
      si('Events', totalEvents),
      data.total_budget ? si('Budget', `€${Math.round(data.total_budget)}`) : '',
    ].filter(Boolean).join('');
  }
}

// ── Follow-up chat ────────────────────────────────────────────────────────────
async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg   = input.value.trim();
  if (!msg || isWorking || !currentItinerary) return;

  input.value = '';
  appendUserMsg(msg);
  setWorking(true);
  appendTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        message:           msg,
        current_itinerary: currentItinerary,
        original_params:   originalParams,
      }),
    });
    removeTyping();

    if (!res.ok) {
      const err = await res.json();
      appendAiMsg(`Could not apply change: ${err.detail || 'HTTP ' + res.status}`);
      return;
    }

    const data   = await res.json();
    const itin   = data.itinerary || data;
    currentItinerary = itin;
    appendAiMsg("Done! I've updated your itinerary. Check the panels on the right.");
    renderItinerary(itin);
    renderTrace(itin.trace || []);

  } catch (e) {
    removeTyping();
    appendAiMsg('Request failed: ' + esc(e.message));
  } finally {
    setWorking(false);
  }
}

// ── Chat helpers ──────────────────────────────────────────────────────────────
function appendUserMsg(text) {
  document.getElementById('messages').insertAdjacentHTML('beforeend', `
    <div class="msg user">
      <div class="avatar">👤</div>
      <div class="bubble">${text}</div>
    </div>`);
  scrollMessages();
}
function appendAiMsg(html) {
  document.getElementById('messages').insertAdjacentHTML('beforeend', `
    <div class="msg ai">
      <div class="avatar">✈</div>
      <div class="bubble">${html}</div>
    </div>`);
  scrollMessages();
}
function appendTyping() {
  document.getElementById('messages').insertAdjacentHTML('beforeend', `
    <div class="msg ai" id="typing-bubble">
      <div class="avatar">✈</div>
      <div class="bubble">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>
    </div>`);
  scrollMessages();
}
function removeTyping() { document.getElementById('typing-bubble')?.remove(); }
function scrollMessages() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}
function setWorking(v) {
  isWorking = v;
  document.getElementById('plan-btn').disabled   = v;
  document.getElementById('chat-input').disabled = v;
  document.getElementById('send-btn').disabled   = v;
}
function showChatInput() { document.getElementById('input-bar').style.display = 'flex'; }

// ── Itinerary render (used by chat modifications — replaces entire panel) ─────
function renderItinerary(data) {
  const schedules   = data.schedules || [];
  const totalEvents = schedules.reduce((n, d) => n + (d.events || []).length, 0);

  const hdr = document.getElementById('itin-header');
  hdr.classList.add('has-data');
  document.getElementById('itin-title').textContent =
    `${data.city || ''} — ${schedules.length} day${schedules.length !== 1 ? 's' : ''}`;

  const summaryParts = [
    data.city         ? si('City', data.city) : '',
    si('Days', schedules.length),
    si('Events', totalEvents),
    data.total_budget ? si('Budget', `€${Math.round(data.total_budget)}`) : '',
  ].filter(Boolean).join('');

  let html = `<div class="summary-bar">${summaryParts}</div>`;
  if (!schedules.length) {
    html += '<p style="color:var(--muted);font-size:.85rem">No schedule data returned.</p>';
  }
  schedules.forEach((day, idx) => {
    const date = day.date || `Day ${idx + 1}`;
    html += `
      <div class="day-card">
        <div class="day-header">
          <span class="day-badge">Day ${idx + 1}</span>
          ${esc(fmtDateLong(date))}
        </div>
        ${(day.events || []).map(renderEvent).join('')}
      </div>`;
  });

  document.getElementById('itin-scroll').innerHTML = html;
}

function renderEvent(ev) {
  if (ev.type === 'visit') {
    const p     = ev.place || {};
    const stars = p.rating ? '★'.repeat(Math.round(p.rating)) : '';
    return `
      <div class="event">
        <span class="event-icon">🏛</span>
        <div style="min-width:0">
          <div class="event-time">${fmtTime(ev.start_time)} – ${fmtTime(ev.end_time)}</div>
          <div class="event-name">${esc(p.name || 'Unknown place')}</div>
          <div class="event-meta">
            ${p.category ? esc(p.category) + ' · ' : ''}
            ${stars ? `<span class="stars">${stars}</span> ${p.rating} · ` : ''}
            ${p.estimated_visit_duration_minutes ? p.estimated_visit_duration_minutes + ' min' : ''}
            ${p.location?.address ? ' · ' + esc(p.location.address) : ''}
          </div>
        </div>
      </div>`;
  }
  if (ev.type === 'meal') {
    const r    = ev.restaurant || {};
    const slot = ev.meal_slot || 'meal';
    const icon = slot === 'breakfast' ? '☕' : slot === 'lunch' ? '🍽' : '🌙';
    return `
      <div class="event">
        <span class="event-icon">${icon}</span>
        <div style="min-width:0">
          <div class="event-time">${fmtTime(ev.time)} · ${slot.charAt(0).toUpperCase() + slot.slice(1)}</div>
          <div class="event-name">${esc(r.name || 'Unknown restaurant')}</div>
          <div class="event-meta">
            ${(r.cuisines || []).join(', ') ? esc((r.cuisines || []).join(', ')) + ' · ' : ''}
            ${r.rating ? `<span class="stars">★</span> ${r.rating} · ` : ''}
            ${'€'.repeat(r.price_level || 0) || 'Price N/A'}
            ${r.location?.address ? ' · ' + esc(r.location.address) : ''}
          </div>
        </div>
      </div>`;
  }
  return '';
}

// ── Agent Trace render ────────────────────────────────────────────────────────
const TOOL_ICONS = {
  recommend_places: '🗺',
  cluster_places:   '📍',
  schedule_day:     '📅',
};

function renderTrace(events) {
  const scroll = document.getElementById('trace-scroll');
  const countEl = document.getElementById('trace-count');

  if (!events || !events.length) {
    scroll.innerHTML = `
      <div class="trace-empty">
        <div class="icon">🔍</div>
        <p>No trace data returned.</p>
      </div>`;
    countEl.textContent = '';
    return;
  }

  countEl.textContent = `${events.length} step${events.length !== 1 ? 's' : ''}`;

  scroll.innerHTML = events.map((ev, i) => {
    const icon    = TOOL_ICONS[ev.tool] || '⚙';
    const inSum   = summarizeInput(ev.tool, ev.input || {});
    const outSum  = summarizeOutput(ev.tool, ev.output || {});
    const inJson  = syntaxHighlight(JSON.stringify(ev.input || {}, null, 2));
    const outJson = syntaxHighlight(JSON.stringify(ev.output || {}, null, 2));
    const inCount = countLabel(ev.tool, ev.input || {});
    const outCount = countLabel2(ev.tool, ev.output || {});

    return `
      <div class="trace-event" id="trace-ev-${i}">
        <div class="trace-event-header" onclick="toggleTrace(${i})">
          <span class="trace-step-badge">#${i + 1}</span>
          <span class="trace-agent">${icon} ${esc(ev.agent || ev.tool)}</span>
          <span class="trace-status ${ev.status}">${statusLabel(ev.status)}</span>
          <span class="trace-chevron">▾</span>
        </div>
        <div class="trace-summary">
          <span><b>In</b>${esc(inSum)}</span>
          <span><b>Out</b>${esc(outSum)}</span>
        </div>
        <div class="trace-detail">
          <div class="trace-section">
            <div class="trace-section-label">
              📤 Input
              ${inCount ? `<span class="badge">${esc(inCount)}</span>` : ''}
            </div>
            <pre class="trace-json">${inJson}</pre>
          </div>
          <div class="trace-section">
            <div class="trace-section-label">
              📥 Output
              ${outCount ? `<span class="badge">${esc(outCount)}</span>` : ''}
            </div>
            <pre class="trace-json">${outJson}</pre>
          </div>
        </div>
      </div>`;
  }).join('');
}

function toggleTrace(i) {
  document.getElementById(`trace-ev-${i}`)?.classList.toggle('open');
}

function statusLabel(s) {
  return s === 'success' ? '✓ success' : s === 'error' ? '✗ error' : '⏭ skipped';
}

function summarizeInput(tool, inp) {
  if (tool === 'recommend_places')
    return `${inp.city || '?'} · ${(inp.trip_start || '').slice(0, 10)} → ${(inp.trip_end || '').slice(0, 10)}`;
  if (tool === 'cluster_places') {
    const n = (inp.place_candidates || []).length;
    return `${n} place${n !== 1 ? 's' : ''} · ${(inp.trip_start || '').slice(0, 10)} → ${(inp.trip_end || '').slice(0, 10)}`;
  }
  if (tool === 'schedule_day') {
    const n = (inp.places || []).length;
    return `${(inp.day_start || '').slice(0, 10)} · ${n} place${n !== 1 ? 's' : ''}${inp.food_budget_per_day ? ' · €' + Math.round(inp.food_budget_per_day) + '/day food' : ''}`;
  }
  return JSON.stringify(inp).slice(0, 80);
}

function summarizeOutput(tool, out) {
  if (out?.error) return `Error: ${out.error}`;
  if (tool === 'recommend_places') {
    const n = (out?.place_candidates || []).length;
    return `${n} candidate${n !== 1 ? 's' : ''}`;
  }
  if (tool === 'cluster_places') {
    const n = (out?.clustered_place_candidates || []).length;
    return `${n} cluster${n !== 1 ? 's' : ''}`;
  }
  if (tool === 'schedule_day') {
    const n = (out?.events || []).length;
    return n > 0 ? `${n} events scheduled (${out.date || ''})` : `Empty day (${out.date || ''})`;
  }
  return JSON.stringify(out).slice(0, 80);
}

function countLabel(tool, inp) {
  if (tool === 'cluster_places') return `${(inp.place_candidates || []).length} places`;
  if (tool === 'schedule_day') return `${(inp.places || []).length} places`;
  return '';
}
function countLabel2(tool, out) {
  if (out?.error) return 'error';
  if (tool === 'recommend_places') return `${(out?.place_candidates || []).length} places`;
  if (tool === 'cluster_places') return `${(out?.clustered_place_candidates || []).length} clusters`;
  if (tool === 'schedule_day') return `${(out?.events || []).length} events`;
  return '';
}

// ── JSON syntax highlighting ──────────────────────────────────────────────────
function syntaxHighlight(json) {
  json = json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return json.replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
    match => {
      if (/^"/.test(match)) {
        return /:$/.test(match)
          ? `<span class="j-key">${match}</span>`
          : `<span class="j-str">${match}</span>`;
      }
      if (/true|false/.test(match)) return `<span class="j-bool">${match}</span>`;
      if (/null/.test(match))        return `<span class="j-null">${match}</span>`;
      return `<span class="j-num">${match}</span>`;
    }
  );
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function si(label, value) {
  return `<div class="summary-item">
    <span class="summary-label">${label}</span>
    <strong>${value}</strong>
  </div>`;
}
function fmtDateLong(iso) {
  if (!iso) return '';
  try {
    return new Date(iso.length === 10 ? iso + 'T12:00:00' : iso)
      .toLocaleDateString('en-GB', {weekday:'short',day:'numeric',month:'short',year:'numeric'});
  } catch { return iso; }
}
function fmtDateShort(iso) {
  if (!iso) return '';
  try { return new Date(iso + 'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
  catch { return iso; }
}
function fmtTime(iso) {
  if (!iso) return ''; try { return iso.slice(11,16); } catch { return ''; }
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────────
checkAgents();
setInterval(checkAgents, 120000);
</script>
