<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trip Planner Agent</title>
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--border:#2d3148;--accent:#6c63ff;--accent2:#ff6584;--text:#e8eaf6;--muted:#8b90b0;--green:#4caf50;--red:#f44336;--yellow:#ff9800}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px}
  h1{font-size:2rem;font-weight:700;margin-bottom:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .subtitle{color:var(--muted);margin-bottom:32px;font-size:.95rem}
  .layout{display:grid;grid-template-columns:380px 1fr;gap:24px;max-width:1400px;margin:0 auto}
  @media(max-width:900px){.layout{grid-template-columns:1fr}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px}
  h2{font-size:1.1rem;font-weight:600;margin-bottom:20px;color:var(--text)}
  label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:6px;margin-top:16px}
  label:first-of-type{margin-top:0}
  input,textarea,select{width:100%;background:#12151f;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;padding:10px 12px;transition:border-color .2s}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
  .tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .tag{display:inline-flex;align-items:center;gap:4px;background:#252840;border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:.8rem;cursor:pointer;transition:all .2s;user-select:none}
  .tag.selected{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn{width:100%;background:linear-gradient(135deg,var(--accent),#8b5cf6);border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:1rem;font-weight:600;margin-top:20px;padding:12px;transition:opacity .2s}
  .btn:hover{opacity:.88}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  /* Status bar */
  .agents-bar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
  .agent-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:.78rem;padding:5px 12px}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .dot.online{background:var(--green)}
  .dot.offline{background:var(--red)}
  .dot.checking{background:var(--yellow);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  /* Progress */
  .progress{display:none;align-items:center;gap:12px;padding:12px 16px;background:#12151f;border-radius:8px;margin-bottom:16px;font-size:.9rem;color:var(--muted)}
  .progress.show{display:flex}
  .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* Itinerary */
  #result{display:none}
  .day-card{border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden}
  .day-header{background:#1e2135;padding:14px 18px;font-weight:600;font-size:1rem;display:flex;align-items:center;gap:10px}
  .day-badge{background:var(--accent);border-radius:20px;padding:2px 10px;font-size:.78rem}
  .event{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:14px;align-items:flex-start}
  .event:first-child{border-top:none}
  .event-icon{font-size:1.4rem;flex-shrink:0;margin-top:2px}
  .event-time{font-size:.8rem;color:var(--muted);white-space:nowrap;min-width:110px}
  .event-name{font-weight:500;margin-bottom:2px}
  .event-meta{font-size:.82rem;color:var(--muted)}
  .stars{color:#ffd700}
  .error-box{background:#2a1520;border:1px solid var(--red);border-radius:8px;padding:14px 18px;color:#ff8a80;font-size:.9rem}
  .summary-bar{display:flex;flex-wrap:wrap;gap:16px;padding:16px;background:#1a1d27;border-radius:8px;margin-bottom:20px;font-size:.88rem}
  .summary-item{display:flex;flex-direction:column;gap:2px}
  .summary-label{color:var(--muted);font-size:.78rem}
</style>
</head>
<body>
<h1>✈ Trip Planner</h1>
<p class="subtitle">Multi-agent AI itinerary builder powered by Google Places &amp; OpenRouter</p>

<div class="layout">
  <!-- ── Left panel: form ── -->
  <div class="card">
    <h2>Plan your trip</h2>

    <label for="city">Destination city</label>
    <input id="city" type="text" placeholder="e.g. Paris, Rome, Tokyo" value="Paris"/>

    <label>Trip dates</label>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <input id="trip_start" type="date" value="2026-06-10"/>
      <input id="trip_end" type="date" value="2026-06-13"/>
    </div>

    <label for="budget">Total budget (EUR, optional)</label>
    <input id="budget" type="number" min="0" placeholder="e.g. 500"/>

    <label for="reason">Trip reason (optional)</label>
    <input id="reason" type="text" placeholder="e.g. honeymoon, family vacation"/>

    <label>Preferences (click to toggle)</label>
    <div class="tag-row" id="prefs-row">
      <span class="tag" data-val="art">Art</span>
      <span class="tag" data-val="history">History</span>
      <span class="tag" data-val="outdoor">Outdoor</span>
      <span class="tag" data-val="food">Food</span>
      <span class="tag" data-val="architecture">Architecture</span>
      <span class="tag" data-val="museums">Museums</span>
      <span class="tag" data-val="nightlife">Nightlife</span>
      <span class="tag" data-val="shopping">Shopping</span>
      <span class="tag" data-val="vegetarian">Vegetarian</span>
      <span class="tag" data-val="family-friendly">Family</span>
    </div>

    <button class="btn" id="plan-btn" onclick="planTrip()">Generate Itinerary</button>
  </div>

  <!-- ── Right panel: output ── -->
  <div>
    <!-- Agent status -->
    <div class="card" style="margin-bottom:20px">
      <h2>Agent status</h2>
      <div class="agents-bar" id="agents-bar">
        <span style="color:var(--muted);font-size:.85rem">Checking…</span>
      </div>
      <button onclick="checkAgents()" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 12px;cursor:pointer;font-size:.8rem">Refresh</button>
    </div>

    <!-- Progress -->
    <div class="progress" id="progress">
      <div class="spinner"></div>
      <span id="progress-text">Contacting orchestrator…</span>
    </div>

    <!-- Error -->
    <div id="error-box" style="display:none" class="error-box"></div>

    <!-- Result -->
    <div id="result">
      <div class="card">
        <h2>Your Itinerary</h2>
        <div class="summary-bar" id="summary-bar"></div>
        <div id="itinerary"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Tag toggle ────────────────────────────────────────────────────────────────
document.querySelectorAll('.tag').forEach(t => {
  t.addEventListener('click', () => t.classList.toggle('selected'));
});

function selectedPrefs() {
  return [...document.querySelectorAll('.tag.selected')].map(t => t.dataset.val);
}

// ── Agent status ──────────────────────────────────────────────────────────────
async function checkAgents() {
  const bar = document.getElementById('agents-bar');
  bar.innerHTML = '<span style="color:var(--muted);font-size:.85rem">Checking…</span>';
  try {
    const res = await fetch('/api/agents/status');
    const data = await res.json();
    bar.innerHTML = data.map(a => `
      <span class="agent-chip">
        <span class="dot ${a.status === 'online' ? 'online' : 'offline'}"></span>
        ${a.name}
      </span>`).join('');
  } catch(e) {
    bar.innerHTML = '<span style="color:var(--red)">Could not reach UI backend</span>';
  }
}

// ── Plan trip ─────────────────────────────────────────────────────────────────
async function planTrip() {
  const city   = document.getElementById('city').value.trim();
  const start  = document.getElementById('trip_start').value;
  const end    = document.getElementById('trip_end').value;
  const budget = document.getElementById('budget').value;
  const reason = document.getElementById('reason').value.trim();
  const prefs  = selectedPrefs();

  if (!city || !start || !end) {
    alert('Please fill in city and trip dates.');
    return;
  }

  setLoading(true);
  hideAll();
  showProgress('Sending request to Orchestrator…');

  const body = {
    city,
    trip_start: start + 'T09:00:00',
    trip_end:   end   + 'T21:00:00',
    total_budget: budget ? parseFloat(budget) : null,
    trip_reason: reason || null,
    preferences: prefs,
  };

  try {
    showProgress('Orchestrator is calling agents (Place Recommender → Clustering → Scheduler). This may take 1–3 minutes…');
    const res  = await fetch('/api/plan', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || `HTTP ${res.status}`);
    }

    const data = await res.json();
    hideProgress();
    renderItinerary(data, body);
  } catch(e) {
    hideProgress();
    showError(e.message);
  } finally {
    setLoading(false);
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderItinerary(data, req) {
  // Summary bar
  const schedules = data.schedules || [];
  const totalEvents = schedules.reduce((n, d) => n + (d.events || []).length, 0);
  document.getElementById('summary-bar').innerHTML = [
    summaryItem('City', data.city || req.city),
    summaryItem('Days', schedules.length),
    summaryItem('Events', totalEvents),
    data.total_budget ? summaryItem('Budget', `€${data.total_budget.toFixed(0)}`) : '',
  ].filter(Boolean).join('');

  // Days
  const container = document.getElementById('itinerary');
  container.innerHTML = '';

  if (!schedules.length) {
    container.innerHTML = '<p style="color:var(--muted)">No schedule data returned.</p>';
  }

  schedules.forEach((day, idx) => {
    const date = day.date || `Day ${idx+1}`;
    const html = `
      <div class="day-card">
        <div class="day-header">
          <span class="day-badge">Day ${idx+1}</span>
          ${formatDate(date)}
        </div>
        ${(day.events||[]).map(renderEvent).join('')}
      </div>`;
    container.insertAdjacentHTML('beforeend', html);
  });

  document.getElementById('result').style.display = 'block';
}

function renderEvent(ev) {
  if (ev.type === 'visit') {
    const p = ev.place || {};
    const st = fmtTime(ev.start_time);
    const et = fmtTime(ev.end_time);
    const stars = p.rating ? '★'.repeat(Math.round(p.rating)) : '';
    return `
      <div class="event">
        <span class="event-icon">🏛</span>
        <div>
          <div class="event-time">${st} – ${et}</div>
          <div class="event-name">${esc(p.name||'Unknown place')}</div>
          <div class="event-meta">
            ${p.category ? esc(p.category)+' · ' : ''}
            ${stars ? `<span class="stars">${stars}</span> ${p.rating} · ` : ''}
            ${p.estimated_visit_duration_minutes ? p.estimated_visit_duration_minutes+' min' : ''}
            ${p.location?.address ? ' · '+esc(p.location.address) : ''}
          </div>
        </div>
      </div>`;
  }
  if (ev.type === 'meal') {
    const r = ev.restaurant || {};
    const time = fmtTime(ev.time);
    const slot = ev.meal_slot || 'meal';
    const icon = slot==='breakfast'?'☕':slot==='lunch'?'🍽':'🌙';
    const cuisines = (r.cuisines||[]).join(', ');
    return `
      <div class="event">
        <span class="event-icon">${icon}</span>
        <div>
          <div class="event-time">${time} · ${slot.charAt(0).toUpperCase()+slot.slice(1)}</div>
          <div class="event-name">${esc(r.name||'Unknown restaurant')}</div>
          <div class="event-meta">
            ${cuisines ? esc(cuisines)+' · ' : ''}
            ${r.rating ? `<span class="stars">★</span> ${r.rating} · ` : ''}
            ${'€'.repeat(r.price_level||0)||'Price N/A'}
            ${r.location?.address ? ' · '+esc(r.location.address) : ''}
          </div>
        </div>
      </div>`;
  }
  return '';
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function summaryItem(label, value) {
  return `<div class="summary-item"><span class="summary-label">${label}</span><strong>${value}</strong></div>`;
}

function formatDate(iso) {
  try { return new Date(iso).toLocaleDateString('en-GB', {weekday:'long',year:'numeric',month:'long',day:'numeric'}); }
  catch { return iso; }
}

function fmtTime(iso) {
  if (!iso) return '';
  try { return iso.slice(11,16); }
  catch { return ''; }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setLoading(v) {
  document.getElementById('plan-btn').disabled = v;
}

function hideAll() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';
}

function showProgress(msg) {
  const el = document.getElementById('progress');
  el.classList.add('show');
  document.getElementById('progress-text').textContent = msg;
}

function hideProgress() {
  document.getElementById('progress').classList.remove('show');
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.style.display = 'block';
  el.textContent = '⚠ ' + msg;
}

// Init
checkAgents();
</script>
</body>
</html>
